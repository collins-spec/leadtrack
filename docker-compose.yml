version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: leadtrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadtrack
      POSTGRES_PASSWORD: leadtrack_dev
      POSTGRES_DB: leadtrack
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: leadtrack-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
